mujoco_sim_ros2_node:
  ros__parameters:
    model_package: agilex_piper_mujoco
    model_file: 'models/demo/piper_slope_demo.xml'
    physics_plugins:
      - 'mujoco_ros2_control::MujocoRos2ControlPlugin'

controller_manager:
  ros__parameters:
    update_rate: 100  # Hz

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    agilex_piper_joint_position_controller:
      type: position_controllers/JointGroupPositionController

    agilex_piper_gripper_position_controller:
      type: position_controllers/JointGroupPositionController

    agilex_piper_joint_trajectory_controller:
      type: joint_trajectory_controller/JointTrajectoryController

    agilex_piper_cartesian_motion_controller:
      type: cartesian_motion_controller/CartesianMotionController

joint_state_broadcaster:
  ros__parameters:
    use_urdf_to_filter: false
    joints:
      - joint1  # Base rotation
      - joint2  # Shoulder
      - joint3  # Elbow
      - joint4  # Wrist 1
      - joint5  # Wrist 2
      - joint6  # Wrist 3
      - joint7  # Left gripper
      - joint8  # right gripper

agilex_piper_joint_position_controller:
  ros__parameters:
    joints:
      - joint1  # Base rotation
      - joint2  # Shoulder
      - joint3  # Elbow
      - joint4  # Wrist 1
      - joint5  # Wrist 2
      - joint6  # Wrist 3

    interface_name: position

    command_interfaces:
      - position

    state_interfaces:
      - position
      - velocity

agilex_piper_gripper_position_controller:
  ros__parameters:
    joints:
      - joint7  # Left gripper finger
      - joint8  # Right gripper finger

    command_interfaces:
      - position

    state_interfaces:
      - position
      - velocity

agilex_piper_joint_trajectory_controller:
  ros__parameters:
    joints:
      - joint1  # Base rotation
      - joint2  # Shoulder
      - joint3  # Elbow
      - joint4  # Wrist 1
      - joint5  # Wrist 2
      - joint6  # Wrist 3

    command_interfaces:
      - position

    state_interfaces:
      - position
      - velocity

    # Action server configuration
    action_monitor_rate: 20.0  # Hz - Rate to monitor action goals

    # Trajectory tolerance and timing
    constraints:
      stopped_velocity_tolerance: 0.02  # rad/s - Max velocity to consider stopped
      goal_time: 0.5                    # s - Time tolerance for reaching goal

      # Individual joint tolerances during trajectory execution
      joint1:
        trajectory: 0.1  # rad - Max position error during trajectory
        goal: 0.05       # rad - Max position error at goal
      joint2:
        trajectory: 0.1
        goal: 0.05
      joint3:
        trajectory: 0.1
        goal: 0.05
      joint4:
        trajectory: 0.1
        goal: 0.05
      joint5:
        trajectory: 0.1
        goal: 0.05
      joint6:
        trajectory: 0.1
        goal: 0.05

    # Trajectory execution parameters
    allow_partial_joints_goal: false      # Require all joints in goal
    allow_integration_in_goal_trajectories: true  # Allow continuous trajectories

    # State tolerance (for preemption detection)
    state_publish_rate: 50.0  # Hz - Rate to publish controller state

    # Open loop control (useful for simulation))
    open_loop_control: false
    allow_nonzero_velocity_at_trajectory_end: false

agilex_piper_cartesian_motion_controller:
  ros__parameters:
    end_effector_link: "tcp"     # End-effector frame
    robot_base_link: "base_link"   # Robot base frame

    joints:
      - joint1
      - joint2
      - joint3
      - joint4
      - joint5
      - joint6

    command_interfaces:
      - position

    # Solver configuration for inverse kinematics
    solver:
      error_scale: 1.0              # Overall error scaling factor
      iterations: 20                # Max iterations per solve cycle
      publish_state_feedback: true  # Publish controller state

    # Cartesian PD gains for each degree of freedom
    # Higher values = more responsive, lower values = smoother
    pd_gains:
      trans_x: {p: 15.0, d: 1.0}   # X translation gains
      trans_y: {p: 15.0, d: 1.0}   # Y translation gains
      trans_z: {p: 15.0, d: 1.0}   # Z translation gains
      rot_x: {p: 8.0, d: 0.5}      # X rotation gains
      rot_y: {p: 8.0, d: 0.5}      # Y rotation gains
      rot_z: {p: 8.0, d: 0.5}      # Z rotation gains
